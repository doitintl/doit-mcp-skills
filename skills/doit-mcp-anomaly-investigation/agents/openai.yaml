interface:
  display_name: "DoiT MCP Anomaly Investigation"
  short_description: "Investigate AWS and GCP anomalies with MCP"
  default_prompt: "Use $doit-mcp-anomaly-investigation to investigate an AWS or GCP anomaly with the correct MCP sequence."
dependencies:
  tools:
    - type: "mcp"
      value: "doit-mcp-server"
      description: "DoiT Cloud Intelligence MCP server — anomaly listing, anomaly details, reporting"
      transport: "sse"
      url: "https://mcp.doit.com/sse"
    - type: "mcp"
      value: "gcp-access-mcp"
      description: "GCP account inspection — check_gcp_access_permission, gcp_account_access. Internal Cloud Run service authenticated via Google Cloud ID token."
      transport: "http"
      url: "https://gcp-access-mcp-${GOOGLE_CLOUD_PROJECT_NUMBER}.us-central1.run.app/mcp"
    - type: "mcp"
      value: "aws-mcp-proxy"
      description: "AWS account inspection — proxies awslabs.core-mcp-server. Internal Cloud Run service authenticated via Google Cloud ID token. Requires X-Customer-Id, X-AWS-Access-Key-Id, X-AWS-Secret-Access-Key, and X-AWS-Region headers."
      transport: "http"
      url: "https://aws-mcp-proxy-${GOOGLE_CLOUD_PROJECT_NUMBER}.us-central1.run.app/mcp"
